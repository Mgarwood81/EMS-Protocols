<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clark County EMS Protocol Study App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#0b5b6b;
    --accent-dark:#083f4a;
    --accent-light:#e5f2f3;
    --teal:#0f7a8c;
    --bg:#f5f7f8;
    --panel:#ffffff;
    --border:#dfe6e8;
    --text:#1c2b2e;
    --muted:#66787c;
    --e-color:#1f8a4c;
    --a-color:#c96a12;
    --p-color:#2058c9;
    --danger:#b5342f;
    --radius:10px;
    --shadow:0 1px 3px rgba(10,40,45,0.08), 0 1px 2px rgba(10,40,45,0.06);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-width:1000px;
  }
  .app-shell{
    display:flex;
    flex-direction:column;
    height:100vh;
  }
  header.topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 24px;
    background:linear-gradient(120deg,var(--accent-dark),var(--accent));
    color:#fff;
    box-shadow:var(--shadow);
    z-index:5;
  }
  header.topbar h1{
    font-size:18px;
    margin:0;
    font-weight:700;
    letter-spacing:0.2px;
  }
  header.topbar .subtitle{
    font-size:12px;
    font-weight:400;
    opacity:0.85;
    margin-top:2px;
  }
  .mode-toggle{
    display:flex;
    background:rgba(255,255,255,0.14);
    border-radius:999px;
    padding:3px;
    gap:2px;
  }
  .mode-toggle button{
    border:none;
    background:transparent;
    color:#fff;
    padding:8px 18px;
    border-radius:999px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    font-family:inherit;
    opacity:0.75;
    transition:all .15s ease;
  }
  .mode-toggle button.active{
    background:#fff;
    color:var(--accent-dark);
    opacity:1;
  }
  .body-wrap{
    flex:1;
    display:flex;
    min-height:0;
  }
  /* ---------- Sidebar / Browse mode ---------- */
  .sidebar{
    width:320px;
    min-width:320px;
    background:var(--panel);
    border-right:1px solid var(--border);
    display:flex;
    flex-direction:column;
    min-height:0;
  }
  .search-wrap{
    padding:14px;
    border-bottom:1px solid var(--border);
  }
  .search-wrap input{
    width:100%;
    padding:9px 12px;
    border:1px solid var(--border);
    border-radius:8px;
    font-size:13px;
    font-family:inherit;
    outline:none;
    background:#fafcfc;
  }
  .search-wrap input:focus{
    border-color:var(--teal);
    box-shadow:0 0 0 3px var(--accent-light);
  }
  .search-meta{
    font-size:11.5px;
    color:var(--muted);
    margin-top:7px;
    padding-left:2px;
  }
  .nav-scroll{
    flex:1;
    overflow-y:auto;
    padding:6px 0 20px;
  }
  .cat-group{
    border-bottom:1px solid #edf1f2;
  }
  .cat-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:11px 16px;
    cursor:pointer;
    user-select:none;
    font-weight:700;
    font-size:12.5px;
    letter-spacing:0.4px;
    text-transform:uppercase;
    color:var(--accent-dark);
  }
  .cat-header:hover{background:var(--accent-light);}
  .cat-header .caret{
    display:inline-block;
    transition:transform .15s ease;
    font-size:10px;
    margin-right:8px;
    color:var(--teal);
  }
  .cat-header.collapsed .caret{transform:rotate(-90deg);}
  .cat-header .count-badge{
    background:var(--accent-light);
    color:var(--accent-dark);
    font-size:11px;
    font-weight:700;
    padding:2px 8px;
    border-radius:999px;
    letter-spacing:0;
  }
  .cat-items{
    display:flex;
    flex-direction:column;
  }
  .cat-items.collapsed{display:none;}
  .nav-item{
    padding:8px 16px 8px 30px;
    font-size:13px;
    color:var(--text);
    cursor:pointer;
    border-left:3px solid transparent;
    line-height:1.35;
  }
  .nav-item:hover{background:#f1f7f7;}
  .nav-item.active{
    background:var(--accent-light);
    border-left-color:var(--teal);
    color:var(--accent-dark);
    font-weight:600;
  }
  .nav-item.hidden{display:none;}
  .cat-group.hidden{display:none;}
  .nav-empty{
    padding:14px 16px;
    font-size:12.5px;
    color:var(--muted);
    font-style:italic;
  }
  /* ---------- Main content / Browse mode ---------- */
  .main-pane{
    flex:1;
    overflow-y:auto;
    padding:32px 44px;
    min-height:0;
  }
  .entry-header h2{
    margin:0 0 4px;
    font-size:24px;
    font-weight:800;
    color:var(--accent-dark);
  }
  .entry-header .cat-pill{
    display:inline-block;
    background:var(--accent-light);
    color:var(--accent-dark);
    font-size:11.5px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.4px;
    padding:3px 10px;
    border-radius:999px;
    margin-bottom:10px;
  }
  .revision-note{
    font-size:12.5px;
    color:var(--muted);
    margin:2px 0 22px;
    font-style:italic;
  }
  .section-block{
    margin-bottom:26px;
  }
  .section-block h3{
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:0.5px;
    color:var(--teal);
    border-bottom:2px solid var(--accent-light);
    padding-bottom:6px;
    margin:0 0 12px;
  }
  .step-list{
    list-style:none;
    margin:0;
    padding:0;
    display:flex;
    flex-direction:column;
    gap:9px;
  }
  .step-list li{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px 13px;
    font-size:14px;
    line-height:1.5;
    box-shadow:var(--shadow);
  }
  .plain-list{
    margin:0;
    padding-left:20px;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .plain-list li{
    font-size:14px;
    line-height:1.5;
  }
  .badge{
    display:inline-block;
    font-size:10.5px;
    font-weight:800;
    padding:1px 6px;
    border-radius:5px;
    margin-right:6px;
    letter-spacing:0.3px;
    color:#fff;
    vertical-align:1px;
  }
  .badge-E{background:var(--e-color);}
  .badge-A{background:var(--a-color);}
  .badge-P{background:var(--p-color);}
  .empty-state{
    color:var(--muted);
    font-size:14px;
    margin-top:60px;
    text-align:center;
  }
  /* ---------- Study Mode ---------- */
  .study-pane{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:30px 30px 40px;
    overflow-y:auto;
  }
  .study-toolbar{
    width:100%;
    max-width:720px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:20px;
    flex-wrap:wrap;
    gap:12px;
  }
  .study-progress{
    font-size:13.5px;
    font-weight:600;
    color:var(--accent-dark);
    background:var(--panel);
    border:1px solid var(--border);
    padding:8px 14px;
    border-radius:8px;
    box-shadow:var(--shadow);
  }
  .study-filter{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:13px;
  }
  .study-filter select{
    font-family:inherit;
    font-size:13px;
    padding:7px 10px;
    border-radius:8px;
    border:1px solid var(--border);
    background:var(--panel);
  }
  .study-actions{
    display:flex;
    gap:8px;
  }
  .btn{
    font-family:inherit;
    font-size:13px;
    font-weight:600;
    padding:8px 16px;
    border-radius:8px;
    border:1px solid var(--border);
    background:var(--panel);
    color:var(--text);
    cursor:pointer;
    transition:all .12s ease;
  }
  .btn:hover{border-color:var(--teal);color:var(--accent-dark);}
  .btn-primary{
    background:var(--accent);
    color:#fff;
    border-color:var(--accent);
  }
  .btn-primary:hover{background:var(--accent-dark);}
  .btn-danger{
    color:var(--danger);
    border-color:#f0d3d1;
  }
  .btn-danger:hover{background:#fbeceb;border-color:var(--danger);}
  .btn-success{
    background:#1f8a4c;
    color:#fff;
    border-color:#1f8a4c;
  }
  .btn-success:hover{background:#166a3a;}
  .btn-warn{
    background:#c96a12;
    color:#fff;
    border-color:#c96a12;
  }
  .btn-warn:hover{background:#a35510;}
  .flashcard{
    width:100%;
    max-width:720px;
    min-height:340px;
    background:var(--panel);
    border-radius:16px;
    border:1px solid var(--border);
    box-shadow:0 4px 18px rgba(10,40,45,0.10), 0 1px 3px rgba(10,40,45,0.08);
    padding:36px 40px;
    display:flex;
    flex-direction:column;
  }
  .flashcard .fc-cat{
    display:inline-block;
    background:var(--accent-light);
    color:var(--accent-dark);
    font-size:11.5px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.4px;
    padding:3px 10px;
    border-radius:999px;
    margin-bottom:14px;
    align-self:flex-start;
  }
  .flashcard .fc-title{
    font-size:26px;
    font-weight:800;
    color:var(--accent-dark);
    margin:0 0 6px;
    line-height:1.25;
  }
  .fc-mastery{
    font-size:12px;
    color:var(--muted);
    margin-bottom:18px;
  }
  .fc-divider{
    border:none;
    border-top:1px dashed var(--border);
    margin:18px 0;
  }
  .fc-back h4{
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.5px;
    color:var(--teal);
    margin:16px 0 8px;
  }
  .fc-back h4:first-child{margin-top:0;}
  .fc-back ul{
    margin:0;
    padding-left:18px;
    font-size:14px;
    line-height:1.5;
  }
  .fc-back ul li{margin-bottom:5px;}
  .fc-center-prompt{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--muted);
    font-size:14px;
  }
  .fc-footer{
    margin-top:auto;
    padding-top:22px;
    display:flex;
    justify-content:center;
    gap:12px;
  }
  .fc-footer button{
    font-size:14px;
    padding:11px 26px;
  }
  .study-empty{
    max-width:720px;
    text-align:center;
    color:var(--muted);
    margin-top:60px;
    font-size:14px;
  }
  /* ---------- Quiz modes (Multiple Choice / Fill in the Blank) ---------- */
  .quiz-source{
    font-size:11.5px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:0.4px;
    font-weight:700;
    margin-bottom:10px;
  }
  .quiz-stem{
    font-size:16px;
    line-height:1.6;
    color:var(--text);
    margin-bottom:4px;
  }
  .quiz-quote{
    background:var(--accent-light);
    border-left:3px solid var(--teal);
    padding:10px 14px;
    border-radius:6px;
    font-style:italic;
    font-size:14.5px;
    line-height:1.5;
    margin:10px 0 4px;
    color:var(--accent-dark);
  }
  .quiz-choices{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-top:18px;
  }
  .quiz-choice-btn{
    font-family:inherit;
    font-size:14.5px;
    text-align:left;
    padding:12px 16px;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--panel);
    color:var(--text);
    cursor:pointer;
    transition:all .12s ease;
    line-height:1.4;
  }
  .quiz-choice-btn:hover:not(.disabled){
    border-color:var(--teal);
    background:var(--accent-light);
  }
  .quiz-choice-btn.disabled{cursor:default;}
  .quiz-choice-btn.correct{
    background:#e5f6ec;
    border-color:#1f8a4c;
    color:#166a3a;
    font-weight:700;
  }
  .quiz-choice-btn.incorrect{
    background:#fbeceb;
    border-color:var(--danger);
    color:var(--danger);
    font-weight:700;
  }
  .quiz-feedback{
    margin-top:16px;
    font-size:14px;
    font-weight:700;
  }
  .quiz-feedback.correct{color:#166a3a;}
  .quiz-feedback.incorrect{color:var(--danger);}
  .fib-blank-row{
    font-size:16px;
    line-height:1.9;
    margin:14px 0 4px;
  }
  .fib-input{
    font-family:inherit;
    font-size:14.5px;
    padding:7px 12px;
    border-radius:8px;
    border:1px solid var(--border);
    min-width:170px;
    outline:none;
  }
  .fib-input:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--accent-light);}
  .fib-input.correct{border-color:#1f8a4c;background:#e5f6ec;}
  .fib-input.incorrect{border-color:var(--danger);background:#fbeceb;}
  .fib-answer-reveal{
    margin-top:10px;
    font-size:13.5px;
    color:var(--muted);
  }
  .fib-answer-reveal strong{color:var(--accent-dark);}
  .hidden-mode{display:none !important;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:#c7d3d5;border-radius:6px;}
  ::-webkit-scrollbar-track{background:transparent;}
</style>
</head>
<body>
<div class="app-shell">
  <header class="topbar">
    <div>
      <h1>Clark County SNHD EMS Protocol Study App</h1>
      <div class="subtitle">Southern Nevada Health District &middot; Prehospital Care Protocols Reference &amp; Flashcard Trainer</div>
    </div>
    <div class="mode-toggle">
      <button id="btn-mode-browse" class="active" onclick="setMode('browse')">Browse</button>
      <button id="btn-mode-study" onclick="setMode('study')">Study Mode</button>
      <button id="btn-mode-mc" onclick="setMode('mc')">Multiple Choice</button>
      <button id="btn-mode-fillblank" onclick="setMode('fillblank')">Fill in Blank</button>
    </div>
  </header>

  <div class="body-wrap">
    <!-- BROWSE MODE -->
    <div id="browse-view" class="body-wrap" style="flex:1;display:flex;min-height:0;">
      <aside class="sidebar">
        <div class="search-wrap">
          <input type="text" id="search-input" placeholder="Search titles, steps, pearls..." oninput="onSearch()">
          <div class="search-meta" id="search-meta">128 protocols &amp; medications</div>
        </div>
        <div class="nav-scroll" id="nav-scroll"></div>
      </aside>
      <main class="main-pane" id="main-pane">
        <div class="empty-state">Select a protocol or medication from the sidebar to begin.</div>
      </main>
    </div>

    <!-- STUDY MODE -->
    <div id="study-view" class="study-pane hidden-mode">
      <div class="study-toolbar">
        <div class="study-progress" id="study-progress">0/0 mastered</div>
        <div class="study-filter">
          <label for="study-cat-filter">Deck:</label>
          <select id="study-cat-filter" onchange="onStudyFilterChange()">
            <option value="All">All Categories</option>
            <option value="Adult">Adult</option>
            <option value="Pediatric">Pediatric</option>
            <option value="Operations">Operations</option>
            <option value="Procedures">Procedures</option>
            <option value="Formulary">Formulary</option>
          </select>
        </div>
        <div class="study-actions">
          <button class="btn" onclick="shuffleCard()">Shuffle</button>
          <button class="btn btn-danger" onclick="resetProgress()">Reset Progress</button>
        </div>
      </div>
      <div id="flashcard-container"></div>
    </div>

    <!-- MULTIPLE CHOICE MODE -->
    <div id="mc-view" class="study-pane hidden-mode">
      <div class="study-toolbar">
        <div class="study-progress" id="mc-score">0/0 correct</div>
        <div class="study-filter">
          <label for="mc-cat-filter">Deck:</label>
          <select id="mc-cat-filter" onchange="onMCFilterChange()">
            <option value="All">All Categories</option>
            <option value="Adult">Adult</option>
            <option value="Pediatric">Pediatric</option>
            <option value="Operations">Operations</option>
            <option value="Procedures">Procedures</option>
            <option value="Formulary">Formulary</option>
          </select>
        </div>
        <div class="study-actions">
          <button class="btn btn-danger" onclick="newMCQuiz()">New Quiz</button>
        </div>
      </div>
      <div id="mc-container"></div>
    </div>

    <!-- FILL IN THE BLANK MODE -->
    <div id="fillblank-view" class="study-pane hidden-mode">
      <div class="study-toolbar">
        <div class="study-progress" id="fb-score">0/0 correct</div>
        <div class="study-filter">
          <label for="fb-cat-filter">Deck:</label>
          <select id="fb-cat-filter" onchange="onFBFilterChange()">
            <option value="All">All Categories</option>
            <option value="Adult">Adult</option>
            <option value="Pediatric">Pediatric</option>
            <option value="Operations">Operations</option>
            <option value="Procedures">Procedures</option>
            <option value="Formulary">Formulary</option>
          </select>
        </div>
        <div class="study-actions">
          <button class="btn btn-danger" onclick="newFBQuiz()">New Quiz</button>
        </div>
      </div>
      <div id="fb-container"></div>
    </div>
  </div>
</div>

<script>
const PROTOCOLS = [
{
  id: "adult-general-assessment", category: "Adult", title: "General Adult Assessment",
  revisionNote: "",
  steps: [
    "Scene Safety / Scene Size-Up; Nature of Call / Mechanism of Injury; PPE / BSI; S.T.A.R.T. Triage if MCI; bring all equipment to patient's side.",
    "Level of Consciousness: if Unresponsive -> check pulse -> if none, go to Cardiac Arrest protocol.",
    "Airway: if signs of compromise or not protecting airway -> Ventilation Management protocol.",
    "Breathing: if inadequate or respiratory distress -> Respiratory Distress protocol.",
    "Circulation: if bleeding -> General Trauma Assessment.",
    "Disability: if altered or confused -> Altered Mental Status/Syncope protocol.",
    "History - HPI & AMPLE; Vital Signs & Physical Exam.",
    "E Blood glucose testing as indicated.",
    "Specific treatment protocol as indicated.",
    "Cervical stabilization as indicated.",
    "Comfort measures (splint, position of comfort).",
    "P Cardiac monitor as indicated.",
    "A Vascular access as indicated.",
    "Oxygen therapy to keep SpO2 >94%.",
    "P Pain management as indicated.",
    "Radio contact for all Trauma Center patients, Code 3 returns, need for telemetry physician & as per protocol.",
    "Transport per Disposition Criteria, if applicable. Transport to closest facility for airway emergencies (inability to adequately ventilate)."
  ],
  history: [], signs: [], differential: [],
  pearls: [
    "For all scenes where patient needs exceed available EMS resources, initial assessment and treatment shall be in accordance with an approved triage methodology.",
    "Correct life-threatening problems as identified.",
    "If the ability to adequately ventilate a patient cannot be established, the patient must be transported to the nearest emergency department.",
    "Never withhold oxygen from a patient in respiratory distress.",
    "Consider oxygen administration in patients with cardiac chest pain when oxygen saturation is below 90%.",
    "Contact with online medical control should be established by radio. Telephone contact may only be used if the call is routed via a recorded phone patch through FAO at 702-382-9007.",
    "Disposition: Trauma patients per Trauma Field Triage Criteria; burn patients per Burns Protocol; pediatric patients (<18 y/o) per Pediatric Destination Protocol; stroke patients per Stroke (CVA) Protocol.",
    "Sexual assault victims <18 y/o shall be transported to Sunrise Hospital; 18+ per Transport Destination Protocol; outside 50-mile radius, nearest appropriate facility.",
    "Stable patients transported to hospital of choice, or closest facility if no preference.",
    "Waiting Room Criteria (if transfer of care has not occurred): normal vital signs (HR 60-100, RR 10-20, SBP 100-180, DBP 60-110, SpO2 >94% room air, A&Ox4); no parenteral meds except single dose analgesia/antiemetic; no continuous cardiac monitoring needed; can sit without adverse impact; verbal report given. Excludes patients on legal psychiatric hold.",
    "Internal Disaster: if hospital declares internal disaster, bypass except for cardiac arrest or inability to adequately ventilate patients."
  ],
  qiMetrics: []
},
{
  id: "adult-general-trauma-assessment", category: "Adult", title: "General Adult Trauma Assessment",
  revisionNote: "revised and MAB approved 4/7/2021",
  steps: [
    "Begin with General Adult Assessment; apply Cervical Stabilization.",
    "Glasgow Coma Score: if GCS <8 -> Ventilation Management, BVM if O2 sat <=94%. If GCS >8 -> E Oxygen keep SpO2 >94%.",
    "Palpable radial pulse? If No -> A Vascular Access, A 1 L NS or LR bolus IV/IO. If Yes -> A Vascular Access.",
    "E Secondary Survey.",
    "Suspected tension pneumothorax / sucking chest wound -> P Needle Decompression; E apply 3-sided occlusive dressing.",
    "Control active hemorrhaging -> E Hemorrhage Control.",
    "Obvious fractures -> E Immobilize fractures; assess distal pulse.",
    "Suspected traumatic brain injury -> E Raise head of bed 30 degrees; P Capnography - ETCO2 35 mmHg.",
    "Open wounds -> E Cover with gauze; wet trauma dressing for abdominal evisceration.",
    "P Pain Management.",
    "Transport & radio contact to appropriate Trauma Center based on TFTC."
  ],
  history: ["Time and mechanism of injury","Damage to structure or vehicle","Location in structure or vehicle","Others injured or dead","Speed and details of MVC","Restraints/protective equipment","Past medical history","Medications"],
  signs: ["Pain, Swelling","Deformity, lesions, bleeding","AMS or unconscious","Hypotension or shock","Arrest"],

{

  revisionNote: "Revised and MAB approved 4/6/2022",
  steps: [
    "Licensed EMS personnel are not obligated to continue resuscitation started by other persons at the scene if patient meets Prehospital Death Determination criteria. Includes telephone CPR initiated by EMD.",
    "Resuscitation should be terminated/not initiated without telemetry contact if a valid DNR/POLST or physician written order is provided.",
    "Resuscitation started in the field may be discontinued only by telemetry physician order when conditions met: For medical arrest, contact closest hospital - patient remains in persistent asystole/agonal rhythm after 20 minutes of appropriate resuscitation (CPR, effective ventilation with 100% O2, ACLS medications if available), confirm no organized rhythm or PEA<40 or 'No Shock Advised' on AED.",
    "For traumatic arrest, contact TRAUMA CENTER based on catchment: open airway with BLS measures, provide CPR/ventilations with 100% O2 for 2 minutes, perform bilateral needle decompression if tension pneumothorax suspected, confirm no organized rhythm or PEA<40 or 'No Shock Advised'.",
    "The patient develops conclusive signs of death at any point: lividity, rigor mortis.",
    "When resuscitation terminated in field, all medical interventions shall be left in place.",
    "If possible, do not leave body unattended; may be excused once responsible person present. NEVER transport/move body without Coroner's office permission except for assessment/protection.",
    "If body in public view creating unsafe situation, cover with clean sterile burn sheet from EMS vehicle.",
    "Notes: In rural/wilderness situations, EMS must attempt medical control contact, but resuscitation may be terminated without medical control if: no return of pulse despite >20 min CPR/ventilation (consider extending for hypothermia/drowning); transport to ED will take >40 min (consider extending for hypothermia/drowning); EMS providers exhausted and physically unable to continue."
  ],

{
  id: "ops-trauma-field-triage", category: "Operations", title: "Trauma Field Triage Criteria",
  revisionNote: "Revised and approved by MAB 08/02/2023",
  steps: [
    "RED Injury Patterns: penetrating injuries to head/neck/torso/proximal extremities; skull deformity/suspected fracture; suspected spinal injury with new motor/sensory loss; chest wall instability/deformity/suspected flail chest; suspected pelvic fracture; suspected fracture of 2+ proximal long bones; crushed/degloved/mangled/pulseless extremity; amputation proximal to wrist/ankle; active bleeding requiring tourniquet or wound packing with continuous pressure.",
    "RED Mental Status & Vital Signs (all patients): unable to follow commands (GCS Motor<6); RR<10 or >29; respiratory distress/need for respiratory support; room-air SpO2<90%. In presence of traumatic mechanism: Age 0-9 SBP<70+(2xage); Age 10-64 SBP<90 or HR>SBP; Age >65 SBP<110 or HR>SBP.",
    "YELLOW Mechanism of Injury: high-risk auto crash (partial/complete ejection, significant intrusion >12in occupant/>18in any site or extrication needed, death in passenger compartment, unrestrained child 0-9), rider separated from vehicle with significant impact, pedestrian/bicycle rider thrown/run over/significant impact, fall from height >10 feet.",
    "YELLOW EMS Judgment: consider risk factors - low-level falls in young children (<=5) or older adults (>=65) with suspected head injury, anticoagulant/antiplatelet use, suspicion of child abuse, special healthcare needs, pregnancy >20 weeks. If concerned, take to a trauma center.",
    "Destination by category: Red Injury/Mental Status/VS - Adult: UMC or Sunrise based on geography (Sunrise catchment: Paradise Rd/County line/Sahara Ave/County line, includes St Rose Siena catchment and Henderson); Pediatric: all go to UMC.",
    "Yellow Mechanism of Injury - Adult: UMC, Sunrise, Siena, or MOMMC based on geography; Pediatric: UMC, Sunrise, or Siena based on geography.",
    "Yellow EMS Judgment: same trauma catchment area as Yellow MOI, or another appropriate facility based on provider judgment.",
    "Additional Notes: all trauma calls meeting TFTC transported by air ambulance go to UMC/Trauma. Guidelines do not preclude transport to any trauma facility if designated center transport would be unduly prolonged due to traffic/weather. Do not preclude transport to closest facility if inability to adequately ventilate might increase mortality. Consider trauma center internal disaster/bypass status. Trauma patients (or guardian) refusing transport to closest appropriate trauma center must sign a release of medical assistance."
  ],

{
  id: "proc-vascular-access", category: "Procedures", title: "Vascular Access",
  revisionNote: "Revised and approved by MAB 8/2/2023",
  steps: [
    "LEVEL: AEMT/Paramedic; EMTs holding EMT-IV endorsement (only under direction of paramedic or AEMT).",
    "Vascular access attempts should not unnecessarily delay transport; attempts should be completed en route; all attempts documented on PCR.",
    "Indications for Peripheral Vascular Access: potential need for IV drug administration or IV fluids for volume expansion. Contraindications: None. Key considerations: saline locks may be used and flushed with 3 ml NS bolus as needed; extension tubing used on all IV lines.",
    "Indications for Intraosseous Access (Paramedic for Adult/Peds, AEMT for Adult and unconscious/unresponsive Peds only): critically ill/injured patient requiring IV drugs/fluids in whom a peripheral line cannot be immediately established.",
    "IO Contraindications: placement in or distal to a fractured bone; previous significant orthopedic procedure at site, prosthetic limb/joint, or IO use in past 48 hours at target bone; infection at insertion site; absence of adequate anatomical landmarks.",
    "Paramedic may administer LIDOCAINE 1% or 2% preservative-free anesthetic in a patient responsive to pain: prime IO extension tubing with lidocaine (1 ml priming volume); slowly infuse LIDOCAINE 40 mg (pediatric: 0.5 mg/kg not to exceed 40 mg) IO over 120 sec; allow to dwell 60 sec; flush IO with 5-10 ml NS; slowly administer additional LIDOCAINE 20 mg IO over 60 sec (pediatric: 0.25 mg/kg not to exceed 20 mg); consider systemic pain medication for patients not responding to IO lidocaine.",
    "Key procedural considerations: only 1 attempt permitted per extremity.",
    "Indications for Previously Established Central Line Access: critically ill/injured patient requiring IV drugs/fluids in whom a peripheral line cannot be established. Contraindications: inability to freely aspirate blood from the catheter. Key considerations: central line access (Implantable Ports, Port-A-Caths, Medports) may only be used if already accessed and IV fluid set-up established/running; these devices require special non-coring needles - standard jumper needles may damage the port."
  ],
  history: [], signs: [], differential: [], pearls: [], qiMetrics: []
},
{

    "Provider must confirm: normal vital signs (with time last taken); patient does not meet Trauma Field Triage Criteria; no indication for ECG/cardiac monitoring; patient is not a threat to self/others; and that the patient denies (with no evidence/suspicion of) pregnancy, active bleeding, allergic reaction, overdose/ingestional error, head trauma, seizure, SOB, abdominal/flank pain above the umbilicus if >35 y/o, stroke, syncope/near syncope/dizziness.",
    "Inclusion criteria mirror the First Response Evaluate/Release procedure: MPDS Alpha/Omega dispatch, age 18-65, decision-making capacity, and patient has a phone to call 911 if condition worsens.",
    "The form documents that the patient's condition was assessed as NOT life/limb threatening, that the crew is returning to service while an ambulance continues to respond, and that the patient consents to wait and understands they may call 911 if their condition worsens. Both patient and provider sign the form."

{
  id: "appendix-b", category: "Appendices", title: "Appendix B: Release of Medical Assistance",
  revisionNote: "",
  steps: [
    "Sample algorithm for a patient refusal of care/transport (Release of Medical Assistance).",
    "Describe the proposed treatment plan to the patient. If the patient agrees, initiate care.",
    "If the patient does not agree, EMS assesses: is there suspected compromise in judgment in the presence of a life/limb-threatening injury/illness? If yes, initiate care under implied consent.",
    "If no compromise suspected: is the patient an adult or emancipated minor with decision-making capacity? If yes, explain and document specific risks of refusal.",
    "If not (e.g., minor without capacity): is a guardian available (consider cellular or dispatch-assisted contact)? If available, enlist their input. If not available, consider whether it is a 'rational teen in a low-risk situation' - if so, may accept a waiver if the patient is willing to sign; if not, initiate care under implied consent.",
    "If the patient is willing to sign a waiver, document efforts and the patient's refusal to sign, or obtain the signed waiver.",
    "Notes: for all patients refusing transport who meet Trauma Field Triage Criteria, contact a trauma center. EMS personnel may make telemetry contact for further guidance at any time.",
    "Also enlist help of others as appropriate (police, friends, family, medical control) when working through a refusal scenario."
  ],

var CATEGORY_ORDER = ["Adult","Pediatric","Operations","Procedures","Formulary","Appendices"];

// Set of real Formulary drug-name word tokens (uppercased), derived from
// Formulary entry titles. Used to reliably detect genuine drug-name mentions
// (written in ALL CAPS per this document's convention, e.g. "A EPINEPHRINE 1 mg")
// inside step/pearl text so Fill in the Blank never blanks an arbitrary word.
var FORMULARY_DRUG_WORDS = (function(){
  var set = {};
  PROTOCOLS.forEach(function(e){
    if(e.category !== "Formulary") return;
    var words = e.title.toUpperCase().split(/[^A-Z]+/);
    words.forEach(function(w){ if(w.length >= 4) set[w] = true; });
  });
  return set;
})();

/* ---------------- Utility ---------------- */

function escapeHtml(str){
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

// Renders a bullet string, converting standalone E / A / P / E/A / A/P provider
// markers (at the start of the string, or following a "-> " transition) into
// small colored badges.
function renderBullet(text){
  var escaped = escapeHtml(text);
  // Match marker at very start of string: "E ", "A ", "P ", "E/A ", "A/P "
  escaped = escaped.replace(/^(E\/A|A\/P|E|A|P)\s/, function(m, marker){
    return renderMarkerBadges(marker) + " ";
  });
  // Match marker following "-&gt; " (escaped form of "-> ")
  escaped = escaped.replace(/(-&gt;\s)(E\/A|A\/P|E|A|P)\s/g, function(m, arrow, marker){
    return arrow + renderMarkerBadges(marker) + " ";
  });
  return escaped;
}

function renderMarkerBadges(marker){
  var parts = marker.split("/");
  return parts.map(function(p){
    return '<span class="badge badge-' + p + '">' + p + '</span>';
  }).join("");
}

function getAllEntries(){
  return PROTOCOLS;
}

function groupByCategory(entries){
  var groups = {};
  CATEGORY_ORDER.forEach(function(c){ groups[c] = []; });
  entries.forEach(function(e){
    if(!groups[e.category]) groups[e.category] = [];
    groups[e.category].push(e);
  });
  return groups;
}

/* ---------------- Mode switching ---------------- */

function setMode(mode){
  currentMode = mode;
  document.getElementById("btn-mode-browse").classList.toggle("active", mode === "browse");
  document.getElementById("btn-mode-study").classList.toggle("active", mode === "study");
  document.getElementById("btn-mode-mc").classList.toggle("active", mode === "mc");
  document.getElementById("btn-mode-fillblank").classList.toggle("active", mode === "fillblank");
  document.getElementById("browse-view").classList.toggle("hidden-mode", mode !== "browse");
  document.getElementById("study-view").classList.toggle("hidden-mode", mode !== "study");
  document.getElementById("mc-view").classList.toggle("hidden-mode", mode !== "mc");
  document.getElementById("fillblank-view").classList.toggle("hidden-mode", mode !== "fillblank");
  if(mode === "study"){
    updateStudyProgress();
    if(!currentCard){
      shuffleCard();
    }
  }
  if(mode === "mc" && !mcCurrentQuestion){
    newMCQuiz();
  }
  if(mode === "fillblank" && !fbCurrentQuestion){
    newFBQuiz();
  }
}

/* ---------------- Browse mode: sidebar ---------------- */

function buildSidebar(){
  var groups = groupByCategory(getAllEntries());
  var html = "";
  CATEGORY_ORDER.forEach(function(cat){
    var items = groups[cat] || [];
    var collapsed = !!collapsedCats[cat];
    html += '<div class="cat-group" data-cat="' + cat + '">';
    html += '  <div class="cat-header' + (collapsed ? ' collapsed' : '') + '" onclick="toggleCategory(\'' + cat + '\')">';
    html += '    <span><span class="caret">&#9660;</span>' + cat + '</span>';
    html += '    <span class="count-badge">' + items.length + '</span>';
    html += '  </div>';
    html += '  <div class="cat-items' + (collapsed ? ' collapsed' : '') + '" id="cat-items-' + cat + '">';
    items.forEach(function(e){
      html += '<div class="nav-item" data-id="' + e.id + '" data-title="' + escapeHtml(e.title.toLowerCase()) + '" onclick="selectEntry(\'' + e.id + '\')">' + escapeHtml(e.title) + '</div>';
    });
    html += '  </div>';
    html += '</div>';
  });
  document.getElementById("nav-scroll").innerHTML = html;
  updateActiveNavHighlight();
}

function toggleCategory(cat){
  collapsedCats[cat] = !collapsedCats[cat];
  var header = document.querySelector('.cat-group[data-cat="' + cat + '"] .cat-header');
  var items = document.getElementById("cat-items-" + cat);
  if(header) header.classList.toggle("collapsed", collapsedCats[cat]);
  if(items) items.classList.toggle("collapsed", collapsedCats[cat]);
}

function updateActiveNavHighlight(){
  var navItems = document.querySelectorAll(".nav-item");
  navItems.forEach(function(el){
    el.classList.toggle("active", el.getAttribute("data-id") === selectedId);
  });
}

function selectEntry(id){
  selectedId = id;
  updateActiveNavHighlight();
  renderEntry(id);
}

/* ---------------- Browse mode: search ---------------- */

function onSearch(){
  var q = document.getElementById("search-input").value.trim().toLowerCase();
  var all = getAllEntries();
  var meta = document.getElementById("search-meta");

  if(!q){
    document.querySelectorAll(".nav-item").forEach(function(el){ el.classList.remove("hidden"); });
    document.querySelectorAll(".cat-group").forEach(function(el){ el.classList.remove("hidden"); });
    meta.textContent = all.length + " protocols & medications";
    return;
  }

  var matchCount = 0;
  CATEGORY_ORDER.forEach(function(cat){
    var groupEl = document.querySelector('.cat-group[data-cat="' + cat + '"]');
    if(!groupEl) return;
    var anyVisible = false;
    var itemEls = groupEl.querySelectorAll(".nav-item");
    itemEls.forEach(function(itemEl){
      var id = itemEl.getAttribute("data-id");
      var entry = all.find(function(e){ return e.id === id; });
      var isMatch = entryMatchesQuery(entry, q);
      itemEl.classList.toggle("hidden", !isMatch);
      if(isMatch){ anyVisible = true; matchCount++; }
    });
    groupEl.classList.toggle("hidden", !anyVisible);
  });
  meta.textContent = matchCount + " match" + (matchCount === 1 ? "" : "es") + " for \"" + q + "\"";
}

function entryMatchesQuery(entry, q){
  if(!entry) return false;
  if(entry.title.toLowerCase().indexOf(q) !== -1) return true;
  var fields = ["steps","history","signs","differential","pearls","qiMetrics"];
  for(var i=0;i<fields.length;i++){
    var arr = entry[fields[i]] || [];
    for(var j=0;j<arr.length;j++){
      if(String(arr[j]).toLowerCase().indexOf(q) !== -1) return true;
    }
  }
  return false;
}

/* ---------------- Browse mode: main content ---------------- */

function renderEntry(id){
  var entry = getAllEntries().find(function(e){ return e.id === id; });
  var pane = document.getElementById("main-pane");
  if(!entry){
    pane.innerHTML = '<div class="empty-state">Protocol not found.</div>';
    return;
  }

  var html = '<div class="entry-header">';
  html += '<span class="cat-pill">' + escapeHtml(entry.category) + '</span>';
  html += '<h2>' + escapeHtml(entry.title) + '</h2>';
  if(entry.revisionNote){
    html += '<div class="revision-note">' + escapeHtml(entry.revisionNote) + '</div>';
  } else {
    html += '<div class="revision-note">&nbsp;</div>';
  }
  html += '</div>';

  html += renderStepsSection("Algorithm / Steps", entry.steps);
  html += renderPlainSection("History", entry.history);
  html += renderPlainSection("Signs &amp; Symptoms", entry.signs);
  html += renderPlainSection("Differential", entry.differential);
  html += renderStepsSection("Pearls", entry.pearls);
  html += renderPlainSection("QI Metrics", entry.qiMetrics);

  pane.innerHTML = html || '<div class="empty-state">No content available for this entry.</div>';
  pane.scrollTop = 0;
}

function renderStepsSection(label, arr){
  if(!arr || !arr.length) return "";
  var html = '<div class="section-block"><h3>' + label + '</h3><ul class="step-list">';
  arr.forEach(function(item){
    html += '<li>' + renderBullet(item) + '</li>';
  });
  html += '</ul></div>';
  return html;
}

function renderPlainSection(label, arr){
  if(!arr || !arr.length) return "";
  var html = '<div class="section-block"><h3>' + label + '</h3><ul class="plain-list">';
  arr.forEach(function(item){
    html += '<li>' + renderBullet(item) + '</li>';
  });
  html += '</ul></div>';
  return html;
}

/* ---------------- Study Mode: mastery storage ---------------- */

function loadMastery(){
  try{
    var raw = localStorage.getItem(MASTERY_KEY);
    return raw ? JSON.parse(raw) : {};
  }catch(e){
    return {};
  }
}

function saveMastery(data){
  try{
    localStorage.setItem(MASTERY_KEY, JSON.stringify(data));
  }catch(e){ /* localStorage unavailable */ }
}

function getMasteryFor(id){
  var data = loadMastery();
  return data[id] || 0;
}

function setMasteryFor(id, value){
  var data = loadMastery();
  data[id] = value;
  saveMastery(data);
}

function getStudyDeck(){
  var all = getAllEntries().filter(function(e){ return e.category !== "Appendices"; });
  if(studyFilter !== "All"){
    all = all.filter(function(e){ return e.category === studyFilter; });
  }
  return all;
}

function updateStudyProgress(){
  var deck = getStudyDeck();
  var mastery = loadMastery();
  var masteredCount = deck.filter(function(e){ return (mastery[e.id] || 0) >= MASTERY_THRESHOLD; }).length;
  document.getElementById("study-progress").textContent = masteredCount + "/" + deck.length + " mastered";
}

/* ---------------- Study Mode: weighted card selection ---------------- */

function pickWeightedCard(deck){
  if(!deck.length) return null;
  var mastery = loadMastery();
  // Weight inversely to mastery: mastery 0-1 => weight 5, 2 => weight 3, 3+ => weight 1
  var weighted = deck.map(function(e){
    var m = mastery[e.id] || 0;
    var weight;
    if(m <= 1) weight = 5;
    else if(m === 2) weight = 3;
    else weight = 1;
    return { entry: e, weight: weight };
  });
  var total = weighted.reduce(function(sum, w){ return sum + w.weight; }, 0);
  var r = Math.random() * total;
  var acc = 0;
  for(var i=0;i<weighted.length;i++){
    acc += weighted[i].weight;
    if(r <= acc) return weighted[i].entry;
  }
  return weighted[weighted.length - 1].entry;
}

function shuffleCard(){
  var deck = getStudyDeck();
  if(!deck.length){
    currentCard = null;
    renderStudyEmpty();
    return;
  }
  // Avoid immediately repeating the same card when possible
  var next = pickWeightedCard(deck);
  if(deck.length > 1 && currentCard && next.id === currentCard.id){
    for(var attempts=0; attempts<5; attempts++){
      var candidate = pickWeightedCard(deck);
      if(candidate.id !== currentCard.id){ next = candidate; break; }
    }
  }
  currentCard = next;
  renderFlashcard(false);
}

function onStudyFilterChange(){
  studyFilter = document.getElementById("study-cat-filter").value;
  updateStudyProgress();
  shuffleCard();
}

function renderStudyEmpty(){
  document.getElementById("flashcard-container").innerHTML =
    '<div class="study-empty">No entries available for this deck filter.</div>';
}

/* ---------------- Study Mode: flashcard rendering ---------------- */

function condensedSummary(entry){
  var html = "";
  if(entry.steps && entry.steps.length){
    html += '<h4>Key Steps</h4><ul>';
    entry.steps.slice(0, 4).forEach(function(s){
      html += '<li>' + renderBullet(s) + '</li>';
    });
    html += '</ul>';
  }
  if(entry.differential && entry.differential.length){
    html += '<h4>Top Differentials</h4><ul>';
    entry.differential.slice(0, 3).forEach(function(s){
      html += '<li>' + escapeHtml(s) + '</li>';
    });
    html += '</ul>';
  }
  if(entry.pearls && entry.pearls.length){
    html += '<h4>Key Pearls</h4><ul>';
    entry.pearls.slice(0, 3).forEach(function(s){
      html += '<li>' + renderBullet(s) + '</li>';
    });
    html += '</ul>';
  }
  if(!html){
    html = '<div class="fc-center-prompt">No condensed detail available.</div>';
  }
  return html;
}

function renderFlashcard(showAnswer){
  var container = document.getElementById("flashcard-container");
  if(!currentCard){
    renderStudyEmpty();
    return;
  }
  var entry = currentCard;
  var mastery = getMasteryFor(entry.id);

  var html = '<div class="flashcard">';
  html += '<span class="fc-cat">' + escapeHtml(entry.category) + '</span>';
  html += '<div class="fc-title">' + escapeHtml(entry.title) + '</div>';
  html += '<div class="fc-mastery">Mastery: ' + mastery + ' correct in a row' + (mastery >= MASTERY_THRESHOLD ? ' &mdash; Mastered' : '') + '</div>';

  if(!showAnswer){
    html += '<div class="fc-center-prompt">Recall the key steps, differentials, and pearls for this entry, then reveal the answer.</div>';
    html += '<div class="fc-footer"><button class="btn btn-primary" onclick="revealAnswer()">Show Answer</button></div>';
  } else {
    html += '<hr class="fc-divider">';
    html += '<div class="fc-back">' + condensedSummary(entry) + '</div>';
    html += '<div class="fc-footer">';
    html += '<button class="btn btn-warn" onclick="gradeCard(false)">Review Again</button>';
    html += '<button class="btn btn-success" onclick="gradeCard(true)">Got it</button>';
    html += '</div>';
  }
  html += '</div>';
  container.innerHTML = html;
}

function revealAnswer(){
  renderFlashcard(true);
}

function gradeCard(gotIt){
  if(!currentCard) return;
  var current = getMasteryFor(currentCard.id);
  if(gotIt){
    setMasteryFor(currentCard.id, current + 1);
  } else {
    setMasteryFor(currentCard.id, 0);
  }
  updateStudyProgress();
  shuffleCard();
}

function resetProgress(){
  var ok = window.confirm("Reset all study progress? This clears mastery data for every flashcard and cannot be undone.");
  if(!ok) return;
  try{ localStorage.removeItem(MASTERY_KEY); }catch(e){ /* ignore */ }
  updateStudyProgress();
  shuffleCard();
}

/* ---------------- Quiz modes: shared helpers ---------------- */

// Same pool rules as flashcard Study Mode: excludes Appendices, optionally
// filtered down to a single category.
function getQuizPool(filterVal){
  var all = getAllEntries().filter(function(e){ return e.category !== "Appendices"; });
  if(filterVal !== "All"){
    all = all.filter(function(e){ return e.category === filterVal; });
  }
  return all;
}

function shuffleArray(arr){
  var a = arr.slice();
  for(var i = a.length - 1; i > 0; i--){
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function extractAdultDoseText(entry){
  var step = (entry.steps || []).find(function(s){ return /^Adult Dose:/i.test(s); });
  if(!step) return null;
  return step.replace(/^Adult Dose:\s*/i, "").trim();
}

/* ---------------- Multiple Choice: question generation ---------------- */

function isGoodStem(text){
  if(!text) return false;
  var t = String(text).trim();
  if(t.length < 25 || t.length > 200) return false;
  if(/^LEVEL:/i.test(t)) return false;
  if(/^Route:/i.test(t)) return false;
  if(/^Adult Dose:/i.test(t)) return false;
  if(/^Pediatric Dose:/i.test(t)) return false;
  if(/^Contraindications:\s*None\.?$/i.test(t)) return false;
  return true;
}

function collectStemCandidates(entry){
  var out = [];
  ["differential", "signs", "pearls"].forEach(function(field){
    (entry[field] || []).forEach(function(text){
      out.push({ field: field, text: text });
    });
  });
  (entry.steps || []).forEach(function(text){
    if(isGoodStem(text)) out.push({ field: "steps", text: text });
  });
  return out;
}

function fieldPromptLabel(field){
  if(field === "differential") return "This is a differential diagnosis listed under which protocol or medication?";
  if(field === "signs") return "This sign or symptom is listed under which protocol?";
  if(field === "pearls") return "This clinical pearl is associated with which protocol or medication?";
  return "This step or note is part of which protocol or medication?";
}

function fieldSingular(field){
  if(field === "differential") return "differential";
  if(field === "signs") return "sign/symptom";
  if(field === "pearls") return "pearl";
  return field;
}

// Type 1: show one pearl/differential/sign/step excerpt, ask which entry it belongs to.
function buildTypeOneQuestion(pool){
  for(var attempt = 0; attempt < 50; attempt++){
    var entry = pool[Math.floor(Math.random() * pool.length)];
    var candidates = collectStemCandidates(entry);
    if(!candidates.length) continue;
    var cand = candidates[Math.floor(Math.random() * candidates.length)];
    var otherTitles = shuffleArray(pool.filter(function(e){ return e.id !== entry.id; }).map(function(e){ return e.title; }));
    if(otherTitles.length < 3) continue;
    var choices = shuffleArray([entry.title].concat(otherTitles.slice(0, 3)));
    return {
      sourceLabel: cand.field === "steps" ? "Step / Note" : (cand.field.charAt(0).toUpperCase() + cand.field.slice(1)),
      prompt: fieldPromptLabel(cand.field),
      quote: cand.text,
      choices: choices,
      correctAnswer: entry.title,
      answered: false,
      selected: null
    };
  }
  return null;
}

// Type 2: show 3 real items + 1 fake item from another entry's same field,
// ask which one is NOT actually listed for the named entry.
function buildTypeTwoQuestion(pool){
  var fields = ["differential", "signs", "pearls"];
  for(var attempt = 0; attempt < 40; attempt++){
    var entry = pool[Math.floor(Math.random() * pool.length)];
    var field = fields[Math.floor(Math.random() * fields.length)];
    var arr = entry[field] || [];
    if(arr.length < 3) continue;
    var realItems = shuffleArray(arr).slice(0, 3);
    var others = pool.filter(function(e){ return e.id !== entry.id && (e[field] || []).length > 0; });
    if(!others.length) continue;
    var otherEntry = others[Math.floor(Math.random() * others.length)];
    var otherArr = otherEntry[field] || [];
    var distractorPool = otherArr.filter(function(t){ return arr.indexOf(t) === -1; });
    if(!distractorPool.length) continue;
    var distractor = distractorPool[Math.floor(Math.random() * distractorPool.length)];
    var choices = shuffleArray(realItems.concat([distractor]));
    return {
      sourceLabel: entry.title,
      prompt: 'Which of the following is NOT a listed ' + fieldSingular(field) + ' for "' + entry.title + '"?',
      choices: choices,
      correctAnswer: distractor,
      answered: false,
      selected: null
    };
  }
  return null;
}

// Type 3: Formulary-only "what is the Adult Dose" question, using clean
// (short, single-clause) dose strings straight from the source data so
// nothing gets parsed/garbled.
function buildTypeThreeQuestion(pool){
  var eligible = [];
  pool.forEach(function(e){
    if(e.category !== "Formulary") return;
    var text = extractAdultDoseText(e);
    if(!text) return;
    var semicolons = (text.match(/;/g) || []).length;
    if(text.length <= 140 && semicolons <= 1) eligible.push({ entry: e, text: text });
  });
  if(eligible.length < 4) return null;
  var chosenIdx = Math.floor(Math.random() * eligible.length);
  var chosen = eligible[chosenIdx];
  var others = eligible.filter(function(x, i){ return i !== chosenIdx && x.text !== chosen.text; });
  if(others.length < 3) return null;
  var distractors = shuffleArray(others).slice(0, 3).map(function(x){ return x.text; });
  var choices = shuffleArray([chosen.text].concat(distractors));
  return {
    sourceLabel: "Formulary — Adult Dose",
    prompt: 'What is the labeled Adult Dose for "' + chosen.entry.title + '"?',
    choices: choices,
    correctAnswer: chosen.text,
    answered: false,
    selected: null
  };
}

function generateMCQuestion(pool){
  var builders = shuffleArray(["type1", "type2", "type3"]);
  for(var i = 0; i < builders.length; i++){
    var q = null;
    if(builders[i] === "type1") q = buildTypeOneQuestion(pool);
    else if(builders[i] === "type2") q = buildTypeTwoQuestion(pool);
    else if(builders[i] === "type3") q = buildTypeThreeQuestion(pool);
    if(q) return q;
  }
  // Guaranteed fallback (should be effectively unreachable since every entry
  // has a non-empty steps array): use the entry's first step as the excerpt.
  var entry = pool[Math.floor(Math.random() * pool.length)];
  var otherTitles = shuffleArray(pool.filter(function(e){ return e.id !== entry.id; }).map(function(e){ return e.title; })).slice(0, 3);
  var choices = shuffleArray([entry.title].concat(otherTitles));
  return {
    sourceLabel: "Step / Note",
    prompt: "This step or note is part of which protocol or medication?",
    quote: (entry.steps && entry.steps[0]) || entry.title,
    choices: choices,
    correctAnswer: entry.title,
    answered: false,
    selected: null
  };
}

/* ---------------- Multiple Choice: state & rendering ---------------- */

function onMCFilterChange(){
  mcFilter = document.getElementById("mc-cat-filter").value;
  newMCQuiz();
}

function newMCQuiz(){
  mcScore = { correct: 0, total: 0 };
  updateMCScore();
  nextMCQuestion();
}

function nextMCQuestion(){
  var pool = getQuizPool(mcFilter);
  if(!pool.length){
    mcCurrentQuestion = null;
    renderMCEmpty();
    return;
  }
  mcCurrentQuestion = generateMCQuestion(pool);
  renderMCQuestion();
}

function updateMCScore(){
  document.getElementById("mc-score").textContent = mcScore.correct + "/" + mcScore.total + " correct";
}

function renderMCEmpty(){
  document.getElementById("mc-container").innerHTML =
    '<div class="study-empty">No entries available for this deck filter.</div>';
}

function selectMCChoice(idx){
  if(!mcCurrentQuestion || mcCurrentQuestion.answered) return;
  mcCurrentQuestion.answered = true;
  mcCurrentQuestion.selected = idx;
  mcScore.total++;
  if(mcCurrentQuestion.choices[idx] === mcCurrentQuestion.correctAnswer) mcScore.correct++;
  updateMCScore();
  renderMCQuestion();
}

function renderMCQuestion(){
  var container = document.getElementById("mc-container");
  if(!mcCurrentQuestion){
    renderMCEmpty();
    return;
  }
  var q = mcCurrentQuestion;
  var html = '<div class="flashcard">';
  html += '<span class="fc-cat">Multiple Choice</span>';
  if(q.sourceLabel) html += '<div class="quiz-source">' + escapeHtml(q.sourceLabel) + '</div>';
  html += '<div class="quiz-stem">' + escapeHtml(q.prompt) + '</div>';
  if(q.quote){ html += '<div class="quiz-quote">&ldquo;' + escapeHtml(q.quote) + '&rdquo;</div>'; }
  html += '<div class="quiz-choices">';
  q.choices.forEach(function(choice, i){
    var cls = "quiz-choice-btn";
    var disabledAttr = "";
    if(q.answered){
      cls += " disabled";
      if(choice === q.correctAnswer) cls += " correct";
      else if(i === q.selected) cls += " incorrect";
      disabledAttr = " disabled";
    }
    html += '<button type="button" class="' + cls + '" onclick="selectMCChoice(' + i + ')"' + disabledAttr + '>' + escapeHtml(choice) + '</button>';
  });
  html += '</div>';
  if(q.answered){
    var wasCorrect = q.choices[q.selected] === q.correctAnswer;
    html += '<div class="quiz-feedback ' + (wasCorrect ? "correct" : "incorrect") + '">' +
      (wasCorrect ? "Correct!" : "Not quite — correct answer highlighted above.") + '</div>';
    html += '<div class="fc-footer"><button class="btn btn-primary" onclick="nextMCQuestion()">Next Question</button></div>';
  }
  html += '</div>';
  container.innerHTML = html;
}

/* ---------------- Fill in the Blank: candidate generation ---------------- */

// Gathers two kinds of blank-worthy excerpts from the current pool:
//  (a) Formulary Adult Dose strings, blanking the dose number+unit.
//  (b) Any step/pearl sentence that mentions exactly one recognized
//      Formulary drug name in ALL CAPS (this document's own convention for
//      administered drugs), blanking that drug name.
function buildFBCandidates(pool){
  var candidates = [];

  pool.forEach(function(e){
    if(e.category !== "Formulary") return;
    var doseText = extractAdultDoseText(e);
    if(!doseText || doseText.length > 150) return;
    var m = doseText.match(/\d+(?:\.\d+)?(?:-\d+(?:\.\d+)?)?\s?(?:mg\/kg|mcg\/kg|mEq\/kg|mg|mcg|mEq|g|mL|ml|L|J\/kg|J)\b/i);
    if(!m) return;
    var idx = doseText.indexOf(m[0]);
    candidates.push({
      sourceLabel: "Formulary — Adult Dose — " + e.title,
      before: "Adult Dose: " + doseText.slice(0, idx),
      answer: m[0].trim(),
      after: doseText.slice(idx + m[0].length),
      kind: "dose"
    });
  });

  pool.forEach(function(e){
    ["steps", "pearls"].forEach(function(field){
      (e[field] || []).forEach(function(text){
        if(!text || text.length > 190) return;
        var words = text.match(/\b[A-Z]{4,}\b/g);
        if(!words) return;
        for(var i = 0; i < words.length; i++){
          var w = words[i];
          if(!FORMULARY_DRUG_WORDS[w]) continue;
          var occurrences = text.split(w).length - 1;
          if(occurrences !== 1) continue; // avoid ambiguous/giveaway blanks
          var idx = text.indexOf(w);
          candidates.push({
            sourceLabel: (field === "steps" ? "Step" : "Pearl") + " — " + e.title,
            before: text.slice(0, idx),
            answer: w,
            after: text.slice(idx + w.length),
            kind: "drug"
          });
          break;
        }
      });
    });
  });

  return candidates;
}

function generateFBQuestion(pool){
  var candidates = buildFBCandidates(pool);
  if(!candidates.length) return null;
  var c = candidates[Math.floor(Math.random() * candidates.length)];
  c.answered = false;
  c.userAnswer = "";
  c.isCorrect = false;
  return c;
}

/* ---------------- Fill in the Blank: answer comparison ---------------- */

function normalizeAnswerText(s){
  return String(s || "").trim().toLowerCase().replace(/\s+/g, " ");
}

function compareFBAnswer(userInput, correctAnswer){
  var u = normalizeAnswerText(userInput);
  var c = normalizeAnswerText(correctAnswer);
  if(!u) return false;
  if(u === c) return true;
  var uCore = u.replace(/[^a-z0-9.]/g, "");
  var cCore = c.replace(/[^a-z0-9.]/g, "");
  if(uCore === cCore) return true;
  var uNum = u.match(/\d+(\.\d+)?/);
  var cNum = c.match(/\d+(\.\d+)?/);
  if(uNum && cNum && uNum[0] === cNum[0] && !/[a-z]/i.test(u)){
    return true; // user typed just the number, correct answer is number+unit
  }
  if(cCore.length >= 4 && uCore.length >= 4 && (cCore.indexOf(uCore) === 0 || uCore.indexOf(cCore) === 0)) return true;
  return false;
}

/* ---------------- Fill in the Blank: state & rendering ---------------- */

function onFBFilterChange(){
  fbFilter = document.getElementById("fb-cat-filter").value;
  newFBQuiz();
}

function newFBQuiz(){
  fbScore = { correct: 0, total: 0 };
  updateFBScore();
  nextFBQuestion();
}

function nextFBQuestion(){
  var pool = getQuizPool(fbFilter);
  if(!pool.length){
    fbCurrentQuestion = null;
    renderFBEmpty();
    return;
  }
  fbCurrentQuestion = generateFBQuestion(pool);
  if(!fbCurrentQuestion){
    renderFBEmpty();
    return;
  }
  renderFBQuestion();
}

function updateFBScore(){
  document.getElementById("fb-score").textContent = fbScore.correct + "/" + fbScore.total + " correct";
}

function renderFBEmpty(){
  document.getElementById("fb-container").innerHTML =
    '<div class="study-empty">No fill-in-the-blank questions available for this deck filter. Try a different category.</div>';
}

function checkFBAnswer(){
  if(!fbCurrentQuestion || fbCurrentQuestion.answered) return;
  var input = document.getElementById("fib-input");
  var val = input ? input.value : "";
  var correct = compareFBAnswer(val, fbCurrentQuestion.answer);
  fbCurrentQuestion.answered = true;
  fbCurrentQuestion.userAnswer = val;
  fbCurrentQuestion.isCorrect = correct;
  fbScore.total++;
  if(correct) fbScore.correct++;
  updateFBScore();
  renderFBQuestion();
}

function renderFBQuestion(){
  var container = document.getElementById("fb-container");
  if(!fbCurrentQuestion){
    renderFBEmpty();
    return;
  }
  var q = fbCurrentQuestion;
  var html = '<div class="flashcard">';
  html += '<span class="fc-cat">Fill in the Blank</span>';
  html += '<div class="quiz-source">' + escapeHtml(q.sourceLabel) + '</div>';
  html += '<div class="fib-blank-row">' + escapeHtml(q.before) +
    ' <input type="text" id="fib-input" class="fib-input' + (q.answered ? (q.isCorrect ? " correct" : " incorrect") : "") + '"' +
    (q.answered ? ' value="' + escapeHtml(q.userAnswer || "") + '" disabled' : ' placeholder="type your answer" autocomplete="off"') +
    ' onkeydown="if(event.key===\'Enter\'){checkFBAnswer();}"> ' +
    escapeHtml(q.after) + '</div>';
  if(!q.answered){
    html += '<div class="fc-footer"><button class="btn btn-primary" onclick="checkFBAnswer()">Check</button></div>';
  } else {
    html += '<div class="quiz-feedback ' + (q.isCorrect ? "correct" : "incorrect") + '">' +
      (q.isCorrect ? "Correct!" : "Not quite.") + '</div>';
    html += '<div class="fib-answer-reveal">Correct answer: <strong>' + escapeHtml(q.answer) + '</strong></div>';
    html += '<div class="fc-footer"><button class="btn btn-primary" onclick="nextFBQuestion()">Next Question</button></div>';
  }
  html += '</div>';
  container.innerHTML = html;
  if(!q.answered){
    var el = document.getElementById("fib-input");
    if(el) el.focus();
  }
}

function init(){
  buildSidebar();
  updateStudyProgress();
}

init();
